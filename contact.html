            </div>
            <button type="submit" class="btn-primary w-full justify-center group" id="submitBtn">
              <span>Send Message</span>
              <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>

  <script type="module">
    import initScene from '/src/three-scene.js'
    import { initNav } from '/src/nav.js'
    initNav()
    initScene()

    const form = document.getElementById('contactForm')
    const btn = document.getElementById('submitBtn')

    if (form) {
      form.addEventListener('submit', (e) => {
        e.preventDefault()
        const orig = btn.innerHTML
        btn.innerHTML = '<span>Sending...</span> <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>'
        btn.disabled = true

        const data = new FormData(form)
        const params = new URLSearchParams({
          name: data.get('name'),
          email: data.get('email'),
          subject: data.get('subject') || 'Portfolio Contact',
          message: data.get('message'),
        })

        const mailto = `mailto:dasashish1999@gmail.com?subject=${encodeURIComponent(data.get('subject') || 'Portfolio Contact')}&body=${encodeURIComponent(`From: ${data.get('name')} (${data.get('email')})\n\n${data.get('message')}`)}`
        window.location.href = mailto

        setTimeout(() => {
          btn.innerHTML = orig
          btn.disabled = false
        }, 2000)
      })
    }
  </script>
