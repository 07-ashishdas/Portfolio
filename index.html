  <script type="module">
    import initScene from './src/three-scene.js'
    import { initNav } from './src/nav.js'
    initNav()
    initScene()

    const words = ['Automation Engineer', 'Python Developer', 'Industrial Automation', 'Software Tester', 'Tech Enthusiast']
    let i = 0, j = 0, deleting = false
    const el = document.getElementById('typewriter')
    const cur = document.getElementById('cursor')

    function type() {
      const current = words[i]
      if (!deleting) {
        el.textContent = current.substring(0, j + 1)
        j++
        if (j === current.length) { deleting = true; setTimeout(type, 2000); return }
        setTimeout(type, 80)
      } else {
        el.textContent = current.substring(0, j - 1)
        j--
        if (j === 0) { deleting = false; i = (i + 1) % words.length; setTimeout(type, 400); return }
        setTimeout(type, 35)
      }
    }
    type()
  </script>
